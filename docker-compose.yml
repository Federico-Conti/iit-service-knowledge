services:
  site:
    build: .
    platform: linux/amd64
    ports:
      - "${SITE_PORT:-4000}:${JEKYLL_PORT:-4000}"
      - "${LIVERELOAD_PORT:-35729}:${LIVERELOAD_PORT:-35729}"
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    environment:
      JEKYLL_ENV: development
      JEKYLL_PORT: ${JEKYLL_PORT:-4000}
      LIVERELOAD_PORT: ${LIVERELOAD_PORT:-35729}
    command: >
      sh -lc 'bundle exec jekyll serve
      --config _config.yml,_config_dev.yml
      --host 0.0.0.0
      --port "$${JEKYLL_PORT:-4000}"
      --livereload
      --livereload-port "$${LIVERELOAD_PORT:-35729}"
      --force_polling
      --trace'

volumes:
  bundle_cache:
