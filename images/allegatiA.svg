<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.18"/>
    </filter>

    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2f3a4a"/>
    </marker>

    <marker id="small-arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1.5,1.5 L8,4.5 L1.5,7.5 Z" fill="#667085"/>
    </marker>

    <style>
      .bg { fill: #f7f9fc; }
      .section-title { font: 700 18px Arial, sans-serif; fill: #172033; }
      .label { font: 700 19px Arial, sans-serif; fill: #172033; }
      .small { font: 400 14px Arial, sans-serif; fill: #536174; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #536174; }
      .pill-text { font: 700 13px Arial, sans-serif; fill: #172033; }
      .box { fill: #ffffff; stroke: #d9e1ec; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .actor { fill: #eef4ff; stroke: #9dbaf4; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .agent { fill: #f0fbf7; stroke: #8dd9bd; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .data { fill: #fff8e8; stroke: #f0c36a; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .decision { fill: #f8f0ff; stroke: #c59be8; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .alert { fill: #fff0f0; stroke: #ef9a9a; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .lane { fill: #ffffff; stroke: #e5ebf4; stroke-width: 1.2; rx: 24; }
      .arrow { stroke: #2f3a4a; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7b8797; stroke-width: 2.2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .handoff { stroke: #667085; stroke-width: 2; fill: none; stroke-dasharray: 5 6; marker-end: url(#small-arrow); }
      .soft-line { stroke: #c7d1df; stroke-width: 1.4; fill: none; }
      .badge { fill: #edf2f7; stroke: #cfd8e3; rx: 11; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>

  <!-- Main lanes -->
  <rect class="lane" x="55" y="130" width="1290" height="180"/>
  <text class="section-title" x="80" y="165">1. Request intake</text>

  <rect class="lane" x="55" y="345" width="1290" height="210"/>
  <text class="section-title" x="80" y="380">2. Automated registration</text>

  <rect class="lane" x="55" y="590" width="1290" height="235"/>
  <text class="section-title" x="80" y="625">3. Daily monitoring and decision support</text>

  <!-- Intake flow -->
  <rect class="actor" x="90" y="190" width="230" height="82"/>
  <text class="label" x="120" y="222">Request Owner</text>
  <text class="small" x="120" y="247">Submits Attachment A</text>
  <text class="tiny" x="120" y="265">for an ICT purchase or renewal</text>

  <rect class="box" x="390" y="190" width="250" height="82"/>
  <text class="label" x="420" y="222">ASSYST Ticketing</text>
  <text class="small" x="420" y="247">Receives the request</text>
  <text class="tiny" x="420" y="265">and sends the ticket by email</text>

  <rect class="box" x="710" y="190" width="250" height="82"/>
  <text class="label" x="740" y="222">Incoming Email</text>
  <text class="small" x="740" y="247">Contains ticket details</text>
  <text class="tiny" x="740" y="265">and Attachment A information</text>

  <rect class="actor" x="1030" y="190" width="250" height="82"/>
  <text class="label" x="1060" y="222">ICT Stakeholders</text>
  <text class="small" x="1060" y="247">Need visibility, alerts</text>
  <text class="tiny" x="1060" y="265">and decision support</text>

  <path class="arrow" d="M320 231 H386"/>
  <path class="arrow" d="M640 231 H706"/>
  <path class="dash" d="M960 231 H1026"/>

  <!-- Registration flow -->
  <rect class="agent" x="140" y="430" width="270" height="90"/>
  <text class="label" x="170" y="462">Loader Agent</text>
  <text class="small" x="170" y="487">Reads incoming tickets</text>
  <text class="tiny" x="170" y="506">Extracts and normalizes key fields</text>

  <rect class="data" x="505" y="405" width="310" height="140"/>
  <text class="label" x="535" y="438">Central Register</text>
  <text class="small" x="535" y="463">Single structured source of truth</text>
  <text class="tiny" x="535" y="487">Owner · Ticket ID · Status · Activity</text>
  <text class="tiny" x="535" y="506">Risk · Personal data · Cloud/on-premise</text>
  <text class="tiny" x="535" y="525">ICT support · Dates · ICT owner</text>

  <rect class="decision" x="910" y="430" width="310" height="90"/>
  <text class="label" x="940" y="462">Standard Rules</text>
  <text class="small" x="940" y="487">Identify Fast Track cases</text>
  <text class="tiny" x="940" y="506">and highlight requests needing attention</text>

  <path class="handoff" d="M835 272 C835 350 275 350 275 424"/>
  <path class="arrow" d="M410 475 H499"/>
  <path class="arrow" d="M815 475 H906"/>

  <!-- Monitoring flow -->
  <rect class="agent" x="100" y="665" width="260" height="100"/>
  <text class="label" x="130" y="698">Listener Agent</text>
  <text class="small" x="130" y="723">Runs a daily status check</text>
  <text class="tiny" x="130" y="743">Monitors open requests and deadlines</text>

  <rect class="decision" x="430" y="645" width="260" height="140"/>
  <text class="label" x="460" y="678">Decision Support</text>
  <text class="small" x="460" y="704">Compares open requests</text>
  <text class="tiny" x="460" y="724">with previously approved activities</text>
  <rect class="badge" x="460" y="743" width="94" height="24"/>
  <text class="pill-text" x="475" y="760">Similarity</text>
  <rect class="badge" x="565" y="743" width="91" height="24"/>
  <text class="pill-text" x="582" y="760">Fast Track</text>

  <rect class="alert" x="760" y="645" width="260" height="140"/>
  <text class="label" x="790" y="678">Alerts &amp; Priorities</text>
  <text class="small" x="790" y="704">Flags critical cases</text>
  <text class="tiny" x="790" y="724">near the 15-day threshold</text>
  <text class="tiny" x="790" y="747">and open items requiring action</text>

  <rect class="box" x="1090" y="665" width="230" height="100"/>
  <text class="label" x="1120" y="698">Daily Email Report</text>
  <text class="small" x="1120" y="723">Clear overview for ICT</text>
  <text class="tiny" x="1120" y="743">Status, deadlines, Fast Track, links</text>

  <path class="handoff" d="M660 545 C660 616 230 616 230 659"/>
  <path class="arrow" d="M360 715 H426"/>
  <path class="arrow" d="M690 715 H756"/>
  <path class="arrow" d="M1020 715 H1086"/>
  <path class="dash" d="M1205 665 C1290 585 1290 365 1155 282"/>
</svg>
